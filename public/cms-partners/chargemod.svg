<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80">
  <defs>
    <style>
      .cm-text { font-family: 'Arial', 'Helvetica Neue', sans-serif; font-weight: 700; font-size: 28px; letter-spacing: 0.5px; }
      .cm-charge { fill: #00b4d8; }
      .cm-mod { fill: #2d3436; }
    </style>
  </defs>
  <!-- ChargeMod logo icon - lightning bolt in circle -->
  <g transform="translate(18, 14)">
    <circle cx="22" cy="22" r="20" fill="#00b4d8" opacity="0.12"/>
    <circle cx="22" cy="22" r="16" fill="none" stroke="#00b4d8" stroke-width="2.5"/>
    <polygon points="24,8 14,26 20,26 18,38 30,18 24,18 26,8" fill="#00b4d8"/>
  </g>
  <!-- Brand text -->
  <text x="148" y="44" text-anchor="middle" class="cm-text">
    <tspan class="cm-charge">Charge</tspan><tspan class="cm-mod">Mod</tspan>
  </text>
</svg>