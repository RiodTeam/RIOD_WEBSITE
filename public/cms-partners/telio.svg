    <circle cx="18" cy="12" r="4" fill="#0984e3"/>
    <path d="M 18 16 L 18 40" stroke="#0984e3" stroke-width="3" stroke-linecap="round"/>
    <path d="M 30 32 Q 30 12, 18 12" fill="none" stroke="#0984e3" stroke-width="3" stroke-linecap="round"/>
    <path d="M 36 38 Q 36 6, 18 6" fill="none" stroke="#0984e3" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  </g>
  <!-- Brand text -->
  <text x="128" y="48" text-anchor="middle" class="telio-text">TELIO</text>
  <!-- Accent dot -->
  <circle cx="168" cy="44" r="3" fill="#0984e3"/>
