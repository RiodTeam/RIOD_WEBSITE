<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80">
  <defs>
    <style>
      .telio-text { font-family: 'Arial', 'Helvetica Neue', sans-serif; font-weight: 800; font-size: 36px; fill: #2d3436; letter-spacing: 3px; }
    </style>
  </defs>
  <!-- Telio icon - connectivity/signal waves -->
  <g transform="translate(22, 16)">
