<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80">
  <defs>
    <style>
      .numo-text { font-family: 'Arial', 'Helvetica Neue', sans-serif; font-weight: 800; font-size: 30px; fill: #1a1a2e; letter-spacing: 1px; }
      .numo-accent { font-family: 'Arial', sans-serif; font-weight: 800; font-size: 30px; fill: #00b4d8; letter-spacing: 1px; }
    </style>
  </defs>
  <!-- Numocity logo icon - stylized charging pin/location marker -->
  <g transform="translate(20, 12)">
    <circle cx="18" cy="18" r="16" fill="none" stroke="#00b4d8" stroke-width="3"/>
    <rect x="14" y="10" width="8" height="12" rx="1" fill="#1a1a2e"/>
    <rect x="16" y="22" width="4" height="6" fill="#1a1a2e"/>
    <circle cx="18" cy="15" r="2" fill="#00b4d8"/>
  </g>
  <!-- Brand text with two-color treatment -->
  <text x="140" y="42" text-anchor="middle">
    <tspan class="numo-text">NUMO</tspan><tspan class="numo-accent">CITY</tspan>
  </text>
  <!-- Tagline -->
  <text x="140" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666" letter-spacing="3">EV CHARGING PLATFORM</text>
</svg>