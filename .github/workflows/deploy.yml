name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ~/RIOD_WEBSITE

            # Pull latest code
            git pull origin main

            # Write all environment variables to .env.local
            cat > .env.local << ENVEOF
            DATABASE_URI=${{ secrets.DATABASE_URI }}
            PAYLOAD_SECRET=${{ secrets.PAYLOAD_SECRET }}
            PAYLOAD=true
            NEXT_PUBLIC_SERVER_URL=https://riod.energy
            PAYLOAD_PUBLIC_SERVER_URL=https://riod.energy
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            S3_BUCKET=${{ secrets.S3_BUCKET }}
            NEXT_PUBLIC_SHOPIFY_STORE_DOMAIN=${{ secrets.SHOPIFY_STORE_DOMAIN }}
            NEXT_PUBLIC_SHOPIFY_STOREFRONT_TOKEN=${{ secrets.SHOPIFY_STOREFRONT_TOKEN }}
            DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}
            NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ secrets.GA_MEASUREMENT_ID }}
            ENVEOF

            # Install dependencies
            npm install

            # Generate Payload CMS files
            npx payload generate:types
            npx payload generate:importmap

            # Build Next.js app
            npm run build

            # Restart PM2 process
            pm2 restart riod || pm2 start npm --name "riod" --cwd /home/ubuntu/RIOD_WEBSITE -- start
            pm2 save

            # Setup Nginx reverse proxy (idempotent — skips if already configured)
            if ! command -v nginx &> /dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y nginx
            fi

            if [ ! -f /etc/nginx/sites-available/riod ]; then
              sudo tee /etc/nginx/sites-available/riod > /dev/null << 'NGINXEOF'
            server {
                listen 80;
                server_name riod.in www.riod.in riod.energy www.riod.energy _;

                client_max_body_size 50M;

                location / {
                    proxy_pass http://localhost:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;
                }
            }
            NGINXEOF

              sudo ln -sf /etc/nginx/sites-available/riod /etc/nginx/sites-enabled/
              sudo rm -f /etc/nginx/sites-enabled/default
              sudo nginx -t && sudo systemctl restart nginx
              sudo systemctl enable nginx
              echo "Nginx configured!"
            else
              echo "Nginx already configured, skipping."
            fi

            echo "Deployment complete!"
