name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ~/RIOD_WEBSITE

            # Pull latest code
            git pull origin main

            # NEVER overwrite .env.local - only create if missing
            if [ ! -f .env.local ]; then
              echo "WARNING: .env.local missing! Create it manually on the server."
              echo "Skipping build."
              exit 1
            fi

            # Install dependencies
            npm install

            # Generate Payload CMS files
            npx payload generate:types
            npx payload generate:importmap

            # Clean old build cache and build Next.js app
            rm -rf .next
            npm run build

            # Restart PM2 process
            pm2 restart riod || pm2 start npm --name "riod" --cwd /home/ubuntu/RIOD_WEBSITE -- start
            pm2 save

            # Setup Nginx reverse proxy (idempotent - skips if already configured)
            if ! command -v nginx > /dev/null 2>&1; then
              sudo apt-get update -y
              sudo apt-get install -y nginx
            fi

            if [ ! -f /etc/nginx/sites-available/riod ]; then
              printf '%s\n' 'server {' '    listen 80;' '    server_name riod.in www.riod.in riod.energy www.riod.energy _;' '    client_max_body_size 50M;' '    location / {' '        proxy_pass http://localhost:3000;' '        proxy_http_version 1.1;' '        proxy_set_header Upgrade $http_upgrade;' '        proxy_set_header Connection upgrade;' '        proxy_set_header Host $host;' '        proxy_set_header X-Real-IP $remote_addr;' '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;' '        proxy_set_header X-Forwarded-Proto $scheme;' '        proxy_cache_bypass $http_upgrade;' '    }' '}' | sudo tee /etc/nginx/sites-available/riod > /dev/null
              sudo ln -sf /etc/nginx/sites-available/riod /etc/nginx/sites-enabled/
              sudo rm -f /etc/nginx/sites-enabled/default
              sudo nginx -t && sudo systemctl restart nginx
              sudo systemctl enable nginx
              echo "Nginx configured!"
            else
              echo "Nginx already configured, skipping."
            fi

            echo "Deployment complete!"
